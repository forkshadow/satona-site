<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>How it works - SATONA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS GLOBAL -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- CSS PAGE -->
    <link rel="stylesheet" href="assets/css/howitworks.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <a href="index.html">
        <img src="assets/images/satona-logo-horizontal.png" alt="SATONA Logo">
    </a>
</header>

<!-- HERO -->
<section class="how-hero">
    <div class="how-bg"></div>

    <div class="how-content">
        <h1>Punch your seed into metal.</h1>
        <p class="subtitle">
            No cloud. No hardware dependency. Just steel.
        </p>
    </div>
</section>

<!-- 🪙 PLATE UNIQUE -->
<section class="plates-section">

    <!-- SVG UNIQUE -->
    <div class="svg-container" id="plateFull"></div>

    <!-- FRONT / BACK -->
    <div class="plate-labels">
        <span>FRONT</span>
        <span>BACK</span>
    </div>

</section>

<!-- 📖 STEPS -->
<section class="steps">
    <div class="step">Enter your 24 words</div>
    <div class="step">Convert to binary</div>
    <div class="step">Punch the plate</div>
    <div class="step">Store forever</div>
</section>

<!-- INPUT -->
<section class="input-section">

    <h2>Enter your 24 BIP39 words</h2>

    <div class="words-grid">
        <script>
            for(let i=1;i<=24;i++){
                document.write(`<input type="text" id="word${i}" placeholder="Word ${i}">`);
            }
        </script>
    </div>

    <div class="buttons">
        <button id="previewBtn">Preview your plate</button>
        <button id="resetBtn" class="secondary">Reset</button>
    </div>

    <div id="message" class="message"></div>

</section>

<!-- RESULT (optionnel en bas) -->
<section class="viewer-box">
    <div id="svgContainer"></div>
</section>

<!-- JS -->
<script src="assets/bip39-list.js"></script>
<script src="assets/js/howitworks.js"></script>

</body>
</html>
