<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>How it works - SATONA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS GLOBAL -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- CSS PAGE -->
    <link rel="stylesheet" href="assets/css/howitworks.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <a href="index.html">
        <img src="assets/images/satona-logo-horizontal.png">
    </a>
</header>

<!-- HERO -->
<section class="how-hero">
    <div class="how-bg"></div>

    <div class="how-content">
        <h1>Punch your seed into metal.</h1>
        <p class="subtitle">
            No cloud. No hardware dependency. Just steel.
        </p>
    </div>
</section>

<!-- 🪙 PLATES -->
<section class="plates-section">

    <div class="plates">

        <div class="plate">
            <h3>Front</h3>
            <div class="svg-container" id="plateFront"></div>
        </div>

        <div class="plate">
            <h3>Back</h3>
            <div class="svg-container" id="plateBack"></div>
        </div>

    </div>

</section>

<!-- 📖 STEPS -->
<section class="steps">
    <div class="step">1. Enter your 24 words</div>
    <div class="step">2. Convert to binary</div>
    <div class="step">3. Punch the plate</div>
    <div class="step">4. Store forever</div>
</section>

<!-- INPUT -->
<section class="input-section">

    <h2>Enter your 24 BIP39 words</h2>

    <div class="words-grid">
        <!-- 24 inputs -->
        <script>
            for(let i=1;i<=24;i++){
                document.write(`<input type="text" id="word${i}" placeholder="Word ${i}">`);
            }
        </script>
    </div>

    <div class="buttons">
        <button id="previewBtn">Preview your plate</button>
        <button id="resetBtn" class="secondary">Reset</button>
    </div>

    <div id="message" class="message"></div>

</section>

<!-- RESULT SVG -->
<section class="viewer-box">
    <div id="svgContainer" class="svg-container"></div>
</section>

<!-- JS -->
<script src="assets/bip39-list.js"></script>
<script src="assets/js/howitworks.js"></script>

</body>
</html>
