<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SATONA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <img src="assets/images/satona-logo-horizontal.png" alt="SATONA Logo">
    </div>

    <!-- HERO -->
    <div class="hero">
        <h1>Seed Never Dies.</h1>
        <p>Your crypto. Safe. Forever.</p>
    </div>

    <!-- FEATURES -->
    <div class="section">
        <div class="grid">
            <div class="card">
                <img src="assets/images/bip39.png" alt="BIP39 Tool">
                <h3>BIP39 Tool</h3>
                <p>Convert your words instantly</p>
            </div>
            <div class="card">
                <img src="assets/images/how.png" alt="How it works">
                <h3>How it works</h3>
                <p>Convert. Punch. Store.</p>
            </div>
            <div class="card">
                <img src="assets/images/shop.png" alt="Buy SATONA">
                <h3>Buy SATONA</h3>
                <p>Secure your seed forever</p>
            </div>
            <div class="card">
                <img src="assets/images/why.png" alt="Why SATONA">
                <h3>Why SATONA</h3>
                <p>Fire. Water. Time. Proof.</p>
            </div>
        </div>
        <!-- Ajout de la pièce recto-verso -->
        <div class="coin-section">
            <h3>Your SATONA Plate</h3>
            <img src="assets/images/coin.png" alt="SATONA Coin">
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        © SATONA
    </div>

</body>
</html>
