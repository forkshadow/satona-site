<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BIP39 Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/bip39.css">
</head>
<body>

    <!-- HEADER FIXE -->
    <div class="header">
        <img src="assets/images/satona-logo-horizontal.png" alt="SATONA Logo">
    </div>

    <!-- CONTENU PRINCIPAL -->
    <div class="container">
        <h1>BIP39 Tool</h1>
        <div class="input-box">
            <input type="text" id="bipInput" placeholder="Tapez un mot BIP39">
            <button onclick="getBinary()">Convertir</button>
            <div id="result"></div>
        </div>
    </div>

    <script>
        // Exemple de petite base JSON avec quelques mots (à compléter avec ta liste)
        const bip39List = {
            "abandon": "00000000000",
            "ability": "00000000001",
            // Ajouter les autres mots BIP39 ici
        };

        function getBinary() {
            const word = document.getElementById('bipInput').value.toLowerCase();
            if (bip39List[word]) {
                document.getElementById('result').textContent = 'Binaire : ' + bip39List[word];
            } else {
                document.getElementById('result').textContent = 'Mot non trouvé.';
            }
        }
    </script>

</body>
</html>
