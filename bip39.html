<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BIP39 Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/bip39.css">
</head>
<body>

    <!-- HEADER FIXE -->
    <div class="header">
        <a href="index.html"> <img src="assets/images/satona-logo-horizontal.png" alt="SATONA Logo"> </a>
    </div>

    <!-- CONTENU PRINCIPAL -->
    <div class="container">
        <h1>BIP39 Tool</h1>
        <div class="input-box">
            <input type="text" id="bipInput" placeholder="Tapez un mot BIP39">
            <button onclick="getBinary()">Convertir</button>
            <div id="result"></div>
        </div>
    </div>

    <script>
        let bip39List = {};

        // Charger le fichier JSON
        fetch('assets/bip39-list.js')
            .then(response => response.json())
            .then(data => {
                bip39List = data;
            })
            .catch(error => {
                console.error('Erreur de chargement du fichier JSON :', error);
            });

        function getBinary() {
            const word = document.getElementById('bipInput').value.trim().toLowerCase();
            const result = document.getElementById('result');

            if (bip39List[word] !== undefined) {
                result.textContent = 'Binaire : ' + bip39List[word];
            } else {
                result.textContent = 'Mot non trouvé.';
            }
        }
    </script>

</body>
</html>
