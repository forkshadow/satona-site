<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BIP39 Tool - SATONA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CSS GLOBAL -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <!-- CSS spécifique -->
    <link rel="stylesheet" href="assets/css/bip39.css">
</head>

<body class="subpage">

    <!-- HEADER -->
    <header class="header">

        <a href="index.html" class="logo">
            <img src="assets/images/satona-logo-horizontal.png" alt="SATONA Logo">
        </a>

        <!-- MENU DESKTOP -->
        <nav class="nav">
            <a href="bip39.html">BIP39</a>
            <a href="howitworks.html">How it works</a>
            <a href="#">Security</a>
        </nav>

        <!-- BURGER MOBILE -->
        <div class="burger" id="burger">
            <span></span>
            <span></span>
            <span></span>
        </div>

    </header>

    <!-- MENU MOBILE -->
    <div class="mobile-menu" id="mobileMenu">
        <a href="bip39.html">BIP39 Tool</a>
        <a href="howitworks.html">How it works</a>
        <a href="#">Security</a>
    </div>

    <!-- CONTENU -->
    <main class="container">

        <h1>BIP39 Tool</h1>

        <div class="input-box">
            <input type="text" id="bipInput" placeholder="Enter a BIP39 word">
            <button onclick="getBinary()">Convert</button>
            <div id="result"></div>
        </div>

    </main>

    <!-- HEADER SCROLL -->
    <script>
        window.addEventListener("scroll", function() {
            const header = document.querySelector(".header");
            if (!header) return;

            if (window.scrollY > 50) {
                header.classList.add("scrolled");
            } else {
                header.classList.remove("scrolled");
            }
        });
    </script>

    <!-- MENU MOBILE -->
    <script>
        const burger = document.getElementById("burger");
        const mobileMenu = document.getElementById("mobileMenu");

        if (burger && mobileMenu) {
            burger.addEventListener("click", () => {
                mobileMenu.classList.toggle("active");
            });
        }
    </script>

    <!-- LISTE BIP39 -->
    <script src="assets/bip39-list.js"></script>

    <!-- SCRIPT PRINCIPAL -->
    <script>
        function getBinary() {
            const word = document.getElementById('bipInput').value.trim().toLowerCase();
            const result = document.getElementById('result');

            if (typeof bip39List === "undefined") {
                result.textContent = "Error: list not loaded.";
                return;
            }

            if (bip39List[word] !== undefined) {
                result.textContent = 'Binary: ' + bip39List[word];
            } else {
                result.textContent = 'Word not found.';
            }
        }
    </script>

</body>
</html>
